<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Snake</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-nature">
    <div class="background-decor"></div>
    
    <div class="container">
        <!-- Header / Scoreboard Panel -->
        <header class="panel header-panel">
            <div class="title-container">
                <h1 class="main-title">YILAN OYUNU</h1>
                <div class="subtitle" id="themeName">Tema: Doğa Modu</div>
            </div>
            
            <div class="dashboard">
                <div class="score-card">
                    <span class="label">SKOR</span>
                    <span id="currentScore" class="value">0</span>
                </div>
                <div class="score-card">
                    <span class="label">REKOR</span>
                    <span id="highScore" class="value">0</span>
                </div>
            </div>
        </header>

        <!-- Game Area -->
        <main class="game-wrapper">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            
            <!-- Game Over Overlay -->
            <div id="gameOverScreen" class="overlay hidden panel">
                <h2>OYUN BİTTİ</h2>
                <p>Duvara veya kendinize çarptınız.</p>
                <button id="restartBtn" class="game-btn">YENİDEN BAŞLAT</button>
            </div>
            
            <!-- Start Overlay -->
            <div id="startScreen" class="overlay panel">
                <h2>OYUNA BAŞLA</h2>
                <p>Elmaları topla, yılanı büyüt. 50 Puanda yeni tema açılır!</p>
                <div class="controls-hint">
                    Hareket: Yön Tuşları veya W A S D
                </div>
                <button id="startBtn" class="game-btn">BAŞLAT</button>
            </div>
        </main>
        
    </div>

    <script src="app.js"></script>
</body>
</html>
